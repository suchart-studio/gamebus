<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Khon Kaen Transit Venture</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Itim&display=swap" rel="stylesheet">
    
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

    <style>
        :root {
            --primary-color: #FF5757;
            --secondary-color: #00C2FF;
            --accent-color: #00E676;
            --bg-color: #FFE600;
            --text-color: #1E1E1E;
        }

        * {
            box-sizing: border-box;
            font-family: 'Itim', cursive;
            user-select: none;
            -webkit-user-select: none;
            margin: 0;
            padding: 0;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-color);
            overflow: hidden;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
        }

        #app-container {
            width: 100%;
            max-width: 450px;
            height: 100vh;
            max-height: 850px;
            background: #ffffff;
            position: relative;
            box-shadow: 0 10px 40px rgba(0,0,0,0.2);
            border-radius: 24px;
            overflow: hidden;
            border: 6px solid var(--text-color);
        }

        .screen {
            width: 100%;
            height: 100%;
            position: absolute;
            top: 0;
            left: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 24px;
            transition: transform 0.3s ease-in-out;
            background: #ffffff;
        }

        .hidden {
            transform: translateX(100%);
        }

        /* --- หน้าเมนูหลัก (Icon Menu Grid) --- */
        .title-container {
            text-align: center;
            margin-top: 30px;
        }
        h1 {
            font-size: 3.2rem;
            color: #FF5757;
            text-shadow: 4px 4px 0px #000;
            -webkit-text-stroke: 2px #000;
            letter-spacing: 1px;
        }
        .subtitle {
            font-size: 1.3rem;
            color: #4A4A4A;
            margin-top: 8px;
            font-weight: bold;
            background: #FFF380;
            padding: 5px 15px;
            border-radius: 20px;
            border: 2px solid #000;
        }

        .menu-instruction {
            margin-top: 30px;
            font-size: 1.4rem;
            font-weight: bold;
            color: #555;
        }

        .menu-grid {
            display: grid;
            grid-template-columns: 1fr 1fr; /* แบ่งเป็น 2 คอลัมน์ซ้ายขวา */
            gap: 15px;
            width: 100%;
            margin-top: 15px;
        }

        .menu-icon-btn {
            border: 4px solid #000;
            border-radius: 20px;
            padding: 20px 10px;
            text-align: center;
            cursor: pointer;
            box-shadow: 0 8px 0px #000;
            transition: all 0.1s ease;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: 10px;
        }
        .menu-icon-btn:active {
            transform: translateY(8px);
            box-shadow: 0 0px 0px #000;
        }
        .menu-icon-btn i {
            font-size: 3.5rem;
            color: white;
            text-shadow: 3px 3px 0px #000;
        }
        .menu-icon-btn span {
            font-size: 1.3rem;
            color: white;
            font-weight: bold;
            text-shadow: 2px 2px 0px #000;
            line-height: 1.2;
        }
        .btn-orange { background-color: #FF9100; }
        .btn-purple { background-color: #9C27B0; }

        /* --- หน้าเล่นเกม --- */
        #game-title-banner {
            font-size: 1.5rem;
            font-weight: bold;
            background: #FFF6BF;
            padding: 5px 15px;
            border: 3px solid #000;
            border-radius: 10px;
            margin-bottom: 10px;
            width: 100%;
            text-align: center;
        }

        #game-area {
            width: 100%;
            flex-grow: 1;
            border: 4px solid #000;
            border-radius: 20px;
            position: relative;
            overflow: hidden;
            background-size: cover;
            background-position: center;
        }

        /* คลาสเปลี่ยนพื้นหลังตามเกมที่เลือก */
        .bg-bus-game {
            background-image: url('https://img.freepik.com/free-vector/aerial-view-empty-road-background_1308-25199.jpg');
        }
        .bg-lrt-game {
            background-image: url('https://img.freepik.com/free-vector/city-road-with-railway-aerial-view_1308-31627.jpg');
        }

        .hud {
            display: flex;
            justify-content: space-between;
            width: 100%;
            padding: 12px 20px;
            font-size: 1.6rem;
            font-weight: bold;
            background: #000;
            color: #fff;
            border-radius: 14px;
            margin-bottom: 10px;
        }

        /* วงกลมสุ่มโผล่ให้แตะ */
        .spawn-element {
            position: absolute;
            width: 85px;
            height: 85px;
            border-radius: 50%;
            border: 4px solid #000;
            display: flex;
            justify-content: center;
            align-items: center;
            cursor: pointer;
            transform: translate(-50%, -50%);
            box-shadow: 0 6px 0px #000;
            animation: popIn 0.25s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }
        @keyframes popIn {
            0% { transform: translate(-50%, -50%) scale(0); }
            100% { transform: translate(-50%, -50%) scale(1); }
        }

        /* --- ปุ่มสไตล์อาเขตส่วนกลาง --- */
        .btn-global {
            margin-top: 15px;
            background: var(--primary-color);
            color: white;
            border: 4px solid #000;
            padding: 12px 30px;
            font-size: 1.5rem;
            border-radius: 16px;
            cursor: pointer;
            box-shadow: 0 6px 0px #000;
            text-shadow: 2px 2px 0px #000;
            display: inline-flex;
            align-items: center;
            gap: 10px;
        }
        .btn-global:active {
            transform: translateY(6px);
            box-shadow: 0 0px 0px #000;
        }

        /* --- หน้าอันดับคะแนน --- */
        .leaderboard-box {
            width: 100%;
            background: #FFFDE7;
            border: 4px solid #000;
            border-radius: 18px;
            padding: 15px;
            margin-top: 20px;
            flex-grow: 1;
            overflow-y: auto;
        }
        .score-row {
            background: #fff;
            padding: 12px 15px;
            border: 3px solid #000;
            border-radius: 12px;
            margin-bottom: 10px;
            font-size: 1.2rem;
            font-weight: bold;
            box-shadow: 0 4px 0px rgba(0,0,0,0.1);
        }
        .score-row-header {
            display: flex;
            justify-content: space-between;
            margin-bottom: 5px;
        }
        .game-tag {
            font-size: 0.9rem;
            background: #E0F7FA;
            color: #006064;
            padding: 2px 8px;
            border-radius: 10px;
            border: 1px solid #000;
        }
    </style>
</head>
<body>

    <div id="app-container">
        
        <div id="screen-menu" class="screen">
            <div class="title-container">
                <h1>KK-Transit</h1>
                <div class="subtitle">ตะลุยระบบขนส่งเมืองขอนแก่น!</div>
            </div>

            <div class="menu-instruction">👇 เลือกเกมส์ที่ต้องการเล่นได้เลยวายรุ่น!</div>

            <div class="menu-grid">
                <div class="menu-icon-btn btn-orange" onclick="startGame('bus')">
                    <i class="fa-solid fa-bus"></i>
                    <span>1. โบกรถซิ่ง<br>ขอนแก่น</span>
                </div>
                <div class="menu-icon-btn btn-purple" onclick="startGame('lrt')">
                    <i class="fa-solid fa-train-tram"></i>
                    <span>2. เคลียร์ทาง<br>รถไฟฟ้า LRT</span>
                </div>
            </div>

            <button class="btn-global" style="background: var(--secondary-color); margin-top: 50px;" onclick="showLeaderboard()">
                <i class="fa-solid fa-trophy"></i> ดูอันดับเด็กเทพทั้งหมด
            </button>
        </div>

        <div id="screen-game" class="screen hidden">
            <div id="game-title-banner">ชื่อเกมส์</div>
            <div class="hud">
                <span id="score-txt">คะแนน: 0</span>
                <span id="timer-txt">เวลา: 30</span>
            </div>
            
            <div id="game-area">
                </div>

            <button class="btn-global" onclick="goBackToMenu()">ยอมแพ้กลับหน้าหลัก</button>
        </div>

        <div id="screen-leaderboard" class="screen hidden">
            <h2 style="font-size: 2.3rem; color: #FF5757; text-shadow: 2px 2px 0px #000; -webkit-text-stroke: 1px #000;">🏆 ทำเนียบเด็กเทพ</h2>
            
            <div class="leaderboard-box">
                <div id="leaderboard-list">
                    กำลังโหลดคะแนนจากระบบ...
                </div>
            </div>
            
            <button class="btn-global" onclick="goBackToMenu()">กลับหน้าหลัก</button>
        </div>

    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/12.13.0/firebase-app.js";
        import { getDatabase, ref, set, push, onValue, query, orderByChild, limitToLast } from "https://www.gstatic.com/firebasejs/12.13.0/firebase-database.js";

        // เชื่อมต่อข้อมูล Firebase ของโปรเจกต์คุณสุชาติ
        const firebaseConfig = {
            apiKey: "AIzaSyCJ-E8bN9nz_BWKTNofz7ccuVoo6m8LyAU",
            authDomain: "suchart-915bd.firebaseapp.com",
            databaseURL: "https://suchart-915bd-default-rtdb.asia-southeast1.firebasedatabase.app",
            projectId: "suchart-915bd",
            storageBucket: "suchart-915bd.firebasestorage.app",
            messagingSenderId: "94380768305",
            appId: "1:94380768305:web:a58832ce3d34815261a910",
            measurementId: "G-79ST8F0WK3"
        };

        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);

        let currentGameMode = ''; // 'bus' หรือ 'lrt'
        let score = 0;
        let timeLeft = 30;
        let gameInterval;
        let spawnInterval;

        // ฟังก์ชันเริ่มเกมส์ (สลับระบบตามปุ่มที่กดเลือกเข้ามา)
        window.startGame = function(mode) {
            currentGameMode = mode;
            switchScreen('screen-game');
            
            score = 0;
            timeLeft = 30;
            document.getElementById('score-txt').innerText = `คะแนน: ${score}`;
            document.getElementById('timer-txt').innerText = `เวลา: ${timeLeft}`;
            
            const gameArea = document.getElementById('game-area');
            const titleBanner = document.getElementById('game-title-banner');
            
            // รีเซ็ตคลาสพื้นหลังถนนเดิมออกก่อน
            gameArea.classList.remove('bg-bus-game', 'bg-lrt-game');

            // ตั้งค่าหน้าตาและพื้นหลังตามโหมดเกมส์
            if (currentGameMode === 'bus') {
                titleBanner.innerText = "🚌 เกมโบกรถซิ่ง (แตะรถบัส/สองแถว)";
                gameArea.classList.add('bg-bus-game');
            } else if (currentGameMode === 'lrt') {
                titleBanner.innerText = "🚧 เกมเคลียร์ทางราง LRT (แตะทำลายสิ่งกีดขวาง)";
                gameArea.classList.add('bg-lrt-game');
            }
            
            // จับเวลาถอยหลัง 30 วินาที
            gameInterval = setInterval(() => {
                timeLeft--;
                document.getElementById('timer-txt').innerText = `เวลา: ${timeLeft}`;
                if(timeLeft <= 0) {
                    endGame();
                }
            }, 1000);

            // สุ่มไอคอนโผล่ความเร็วตามโหมดเกมส์
            spawnInterval = setInterval(spawnObject, 700);
        }

        // ฟังก์ชันการสุ่มสร้างวัตถุตามกติกาของแต่ละเกมส์
        function spawnObject() {
            const gameArea = document.getElementById('game-area');
            const element = document.createElement('div');
            element.classList.add('spawn-element');

            const rand = Math.random();
            
            if (currentGameMode === 'bus') {
                // --- กติกาเกมส์ที่ 1: โบกรถซิ่ง ---
                if (rand < 0.35) {
                    element.style.backgroundColor = "#00C2FF"; // Smart Bus ฟ้า
                    element.innerHTML = `<i class="fa-solid fa-bus" style="font-size: 2.5rem; color: #fff;"></i>`;
                    element.dataset.type = "good_bus";
                } else if (rand < 0.70) {
                    element.style.backgroundColor = "#00E676"; // สองแถวเขียว
                    element.innerHTML = `<i class="fa-solid fa-van-shuttle" style="font-size: 2.5rem; color: #fff;"></i>`;
                    element.dataset.type = "good_bus";
                } else {
                    element.style.backgroundColor = "#FF5757"; // รถส่วนตัวทำรถติด
                    element.innerHTML = `<i class="fa-solid fa-car" style="font-size: 2.5rem; color: #fff;"></i>`;
                    element.dataset.type = "bad_car";
                }
            } else if (currentGameMode === 'lrt') {
                // --- กติกาเกมส์ที่ 2: เคลียร์ทาง LRT ---
                if (rand < 0.50) {
                    element.style.backgroundColor = "#FF9100"; // กรวยจราจรขวางทางรถไฟ
                    element.innerHTML = `<i class="fa-solid fa-triangle-exclamation" style="font-size: 2.5rem; color: #fff;"></i>`;
                    element.dataset.type = "obstacle";
                } else {
                    element.style.backgroundColor = "#D32F2F"; // รถยนต์ส่วนตัวมาจอดล้ำเส้นรางรถไฟ
                    element.innerHTML = `<i class="fa-solid fa-car-burst" style="font-size: 2.5rem; color: #fff;"></i>`;
                    element.dataset.type = "obstacle";
                }
            }

            // สุ่มพิกัดบนหน้าจอ
            const x = Math.random() * (gameArea.clientWidth - 90) + 45;
            const y = Math.random() * (gameArea.clientHeight - 90) + 45;
            element.style.left = `${x}px`;
            element.style.top = `${y}px`;

            // ตรวจจับการสัมผัสรวดเร็ว
            element.addEventListener('touchstart', (e) => {
                e.preventDefault();
                handleTap(element);
            });
            element.addEventListener('mousedown', () => handleTap(element));

            gameArea.appendChild(element);

            // ถ้านักเล่นเกมส์แตะไม่ทันในเวลาที่กำหนด วัตถุจะหายไปเอง
            setTimeout(() => {
                if(element.parentNode) {
                    // เฉพาะเกม LRT: ถ้าเคลียร์สิ่งกีดขวางไม่ทัน รถไฟดีเลย์ คะแนนจะถูกหัก!
                    if (currentGameMode === 'lrt' && element.dataset.type === "obstacle") {
                        score -= 10;
                        document.getElementById('score-txt').innerText = `คะแนน: ${score}`;
                    }
                    element.remove();
                }
            }, 1100);
        }

        // ฟังก์ชันคิดคะแนนเมื่อมีการ "แตะสัมผัส" โดนวัตถุ
        function handleTap(element) {
            if (currentGameMode === 'bus') {
                if(element.dataset.type === "good_bus") {
                    score += 10; // โบกถูกคัน ได้แต้ม
                } else {
                    score -= 15; // โบกผิดคัน รถส่วนตัวทำรถติด เสียแต้ม
                }
            } else if (currentGameMode === 'lrt') {
                if(element.dataset.type === "obstacle") {
                    score += 10; // แตะทำลายสิ่งกีดขวางสำเร็จ ได้แต้ม!
                }
            }
            document.getElementById('score-txt').innerText = `คะแนน: ${score}`;
            element.remove();
        }

        // จบเกมส์ บันทึกสถิติลงฐานข้อมูล Firebase
        function endGame() {
            clearInterval(gameInterval);
            clearInterval(spawnInterval);
            document.getElementById('game-area').innerHTML = '';
            
            let gameNameTH = currentGameMode === 'bus' ? "เกมโบกรถซิ่ง" : "เกมเคลียร์ทาง LRT";
            const name = prompt(`🎉 จบการแข่งขันคุณทำได้: ${score} คะแนน\nกรุณาใส่ชื่อเล่นเพื่อบันทึกทำเนียบเด็กเทพขอนแก่น:`) || "ผู้เล่นนิรนาม";
            
            const scoresRef = ref(db, 'leaderboard');
            const newScoreRef = push(scoresRef);
            set(newScoreRef, {
                username: name,
                score: score,
                gameMode: gameNameTH, // บันทึกไว้ด้วยว่าได้แต้มมาจากเกมส์ไหน
                timestamp: Date.now()
            }).then(() => {
                showLeaderboard();
            }).catch((error) => {
                console.error("Firebase Error: ", error);
                switchScreen('screen-menu');
            });
        }

        // ดึงข้อมูลอันดับเด็กเทพจาก Firebase มาแสดงผลรวมกัน
        window.showLeaderboard = function() {
            switchScreen('screen-leaderboard');
            const listDiv = document.getElementById('leaderboard-list');
            listDiv.innerHTML = "กำลังดึงข้อมูลอันดับจากระบบ Firebase...";

            const leaderboardRef = query(ref(db, 'leaderboard'), orderByChild('score'), limitToLast(5));
            
            onValue(leaderboardRef, (snapshot) => {
                listDiv.innerHTML = "";
                const data = [];
                snapshot.forEach((childSnapshot) => {
                    data.push(childSnapshot.val());
                });
                data.reverse(); 

                if(data.length === 0) {
                    listDiv.innerHTML = "<p style='text-align:center;'>ยังไม่มีคะแนนบันทึกในระบบ มาเป็นคนแรกเลย!</p>";
                    return;
                }

                data.forEach((user, index) => {
                    listDiv.innerHTML += `
                        <div class="score-row">
                            <div class="score-row-header">
                                <span>🏅 อันดับ ${index+1} : ${user.username}</span>
                                <span style="color:var(--primary-color);">${user.score} แต้ม</span>
                            </div>
                            <div><span class="game-tag">🕹️ ${user.gameMode || 'เกมโบกรถซิ่ง'}</span></div>
                        </div>
                    `;
                });
            });
        }

        window.goBackToMenu = function() {
            clearInterval(gameInterval);
            clearInterval(spawnInterval);
            document.getElementById('game-area').innerHTML = '';
            switchScreen('screen-menu');
        }

        function switchScreen(screenId) {
            document.querySelectorAll('.screen').forEach(s => s.classList.add('hidden'));
            document.getElementById(screenId).classList.remove('hidden');
        }
    </script>
</body>
</html>
