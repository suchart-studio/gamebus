<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Khon Kaen Transit Game</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Itim&display=swap" rel="stylesheet">
    
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

    <style>
        :root {
            --primary-color: #FF5757;
            --secondary-color: #00C2FF;
            --accent-color: #00E676;
            --bg-color: #FFE600;
            --text-color: #1E1E1E;
        }

        * {
            box-sizing: border-box;
            font-family: 'Itim', cursive;
            user-select: none;
            -webkit-user-select: none;
            margin: 0;
            padding: 0;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-color);
            overflow: hidden;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
        }

        #app-container {
            width: 100%;
            max-width: 450px;
            height: 100vh;
            max-height: 850px;
            background: #ffffff;
            position: relative;
            box-shadow: 0 10px 40px rgba(0,0,0,0.2);
            border-radius: 24px;
            overflow: hidden;
            border: 6px solid var(--text-color);
        }

        .screen {
            width: 100%;
            height: 100%;
            position: absolute;
            top: 0;
            left: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 24px;
            transition: transform 0.3s ease-in-out;
            background: #ffffff;
        }

        .hidden {
            transform: translateX(100%);
        }

        /* --- หน้าเมนูหลัก --- */
        .title-container {
            text-align: center;
            margin-top: 50px;
        }
        h1 {
            font-size: 3.5rem;
            color: #FF5757;
            text-shadow: 4px 4px 0px #000;
            -webkit-text-stroke: 2px #000;
            letter-spacing: 2px;
        }
        .subtitle {
            font-size: 1.4rem;
            color: #4A4A4A;
            margin-top: 10px;
            font-weight: bold;
            background: #FFF380;
            padding: 5px 15px;
            border-radius: 20px;
            border: 2px solid #000;
        }

        .menu-grid {
            display: grid;
            grid-template-columns: 1fr;
            gap: 20px;
            width: 100%;
            margin-top: 60px;
        }

        .menu-icon-btn {
            background: var(--secondary-color);
            border: 4px solid #000;
            border-radius: 20px;
            padding: 25px;
            text-align: center;
            cursor: pointer;
            box-shadow: 0 8px 0px #000;
            transition: all 0.1s ease;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 20px;
        }
        .menu-icon-btn:active {
            transform: translateY(8px);
            box-shadow: 0 0px 0px #000;
        }
        .menu-icon-btn i {
            font-size: 3rem;
            color: white;
            text-shadow: 3px 3px 0px #000;
        }
        .menu-icon-btn span {
            font-size: 1.8rem;
            color: white;
            font-weight: bold;
            text-shadow: 2px 2px 0px #000;
        }
        .menu-icon-btn.btn-orange { background-color: #FF9100; }

        /* --- หน้าเล่นเกม --- */
        #game-area {
            width: 100%;
            flex-grow: 1;
            background: #E8F5E9;
            border: 4px solid #000;
            border-radius: 20px;
            position: relative;
            overflow: hidden;
            /* ใช้ภาพพื้นหลังถนนการ์ตูนฟรีจากเว็บ */
            background-image: url('https://img.freepik.com/free-vector/aerial-view-empty-road-background_1308-25199.jpg');
            background-size: cover;
            background-position: center;
        }

        .hud {
            display: flex;
            justify-content: space-between;
            width: 100%;
            padding: 12px 20px;
            font-size: 1.6rem;
            font-weight: bold;
            background: #000;
            color: #fff;
            border-radius: 14px;
            margin-bottom: 15px;
            box-shadow: 0 4px 0px rgba(0,0,0,0.2);
        }

        /* ปุ่มรถต่างๆ ที่จะสุ่มโผล่ขึ้นมาให้เด็กๆ แตะ */
        .spawn-element {
            position: absolute;
            width: 85px;
            height: 85px;
            border-radius: 50%;
            border: 4px solid #000;
            display: flex;
            justify-content: center;
            align-items: center;
            cursor: pointer;
            transform: translate(-50%, -50%);
            box-shadow: 0 6px 0px #000;
            animation: popIn 0.25s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }
        .spawn-element:active {
            transform: translate(-50%, -50%) scale(0.9);
        }
        @keyframes popIn {
            0% { transform: translate(-50%, -50%) scale(0); }
            100% { transform: translate(-50%, -50%) scale(1); }
        }

        /* --- ปุ่มสไตล์อาเขตส่วนกลาง --- */
        .btn-global {
            margin-top: 20px;
            background: var(--primary-color);
            color: white;
            border: 4px solid #000;
            padding: 12px 30px;
            font-size: 1.5rem;
            border-radius: 16px;
            cursor: pointer;
            box-shadow: 0 6px 0px #000;
            text-shadow: 2px 2px 0px #000;
            display: inline-flex;
            align-items: center;
            gap: 10px;
        }
        .btn-global:active {
            transform: translateY(6px);
            box-shadow: 0 0px 0px #000;
        }

        /* --- หน้าอันดับคะแนน --- */
        .leaderboard-box {
            width: 100%;
            background: #FFFDE7;
            border: 4px solid #000;
            border-radius: 18px;
            padding: 15px;
            margin-top: 20px;
            flex-grow: 1;
            overflow-y: auto;
        }
        .score-row {
            display: flex;
            justify-content: space-between;
            background: #fff;
            padding: 12px 20px;
            border: 3px solid #000;
            border-radius: 12px;
            margin-bottom: 10px;
            font-size: 1.4rem;
            font-weight: bold;
            box-shadow: 0 4px 0px rgba(0,0,0,0.1);
        }
    </style>
</head>
<body>

    <div id="app-container">
        
        <div id="screen-menu" class="screen">
            <div class="title-container">
                <h1>KK-Transit</h1>
                <div class="subtitle">วัยรุ่นขอนแก่น แตะโบกรถสาธารณะ!</div>
            </div>

            <div class="menu-grid">
                <div class="menu-icon-btn btn-orange" onclick="startGame()">
                    <i class="fa-solid fa-gamepad"></i>
                    <span>เริ่มตะลุยเมืองขอนแก่น</span>
                </div>
            </div>

            <button class="btn-global" style="background: var(--secondary-color); margin-top: 60px;" onclick="showLeaderboard()">
                <i class="fa-solid fa-trophy"></i> ดูอันดับเด็กเทพ
            </button>
        </div>

        <div id="screen-game" class="screen hidden">
            <div class="hud">
                <span id="score-txt">คะแนน: 0</span>
                <span id="timer-txt">เวลา: 30</span>
            </div>
            
            <div id="game-area">
                </div>

            <button class="btn-global" onclick="goBackToMenu()">ยอมแพ้/กลับหน้าหลัก</button>
        </div>

        <div id="screen-leaderboard" class="screen hidden">
            <h2 style="font-size: 2.3rem; color: #FF5757; text-shadow: 2px 2px 0px #000; -webkit-text-stroke: 1px #000;">🏆 5 อันดับสูงสุด</h2>
            
            <div class="leaderboard-box">
                <div id="leaderboard-list">
                    กำลังโหลดคะแนนจากระบบ...
                </div>
            </div>
            
            <button class="btn-global" onclick="goBackToMenu()">กลับหน้าหลัก</button>
        </div>

    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/12.13.0/firebase-app.js";
        import { getDatabase, ref, set, push, onValue, query, orderByChild, limitToLast } from "https://www.gstatic.com/firebasejs/12.13.0/firebase-database.js";

        // เชื่อมต่อข้อมูล Firebase ของโปรเจกต์คุณสุชาติ
        const firebaseConfig = {
            apiKey: "AIzaSyCJ-E8bN9nz_BWKTNofz7ccuVoo6m8LyAU",
            authDomain: "suchart-915bd.firebaseapp.com",
            databaseURL: "https://suchart-915bd-default-rtdb.asia-southeast1.firebasedatabase.app",
            projectId: "suchart-915bd",
            storageBucket: "suchart-915bd.firebasestorage.app",
            messagingSenderId: "94380768305",
            appId: "1:94380768305:web:a58832ce3d34815261a910",
            measurementId: "G-79ST8F0WK3"
        };

        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);

        let score = 0;
        let timeLeft = 30;
        let gameInterval;
        let spawnInterval;

        // เริ่มต้นเกมส์
        window.startGame = function() {
            switchScreen('screen-game');
            score = 0;
            timeLeft = 30;
            document.getElementById('score-txt').innerText = `คะแนน: ${score}`;
            document.getElementById('timer-txt').innerText = `เวลา: ${timeLeft}`;
            
            // ตัวนับเวลาถอยหลัง 30 วินาที
            gameInterval = setInterval(() => {
                timeLeft--;
                document.getElementById('timer-txt').innerText = `เวลา: ${timeLeft}`;
                if(timeLeft <= 0) {
                    endGame();
                }
            }, 1000);

            // สุ่มรถโผล่ขึ้นมาบนหน้าจอทุกๆ 0.7 วินาที (ท้าทายความเร็ววัยรุ่น)
            spawnInterval = setInterval(spawnObject, 700);
        }

        // ฟังก์ชันสุ่มไอคอนรถรูปแบบต่างๆ ออกมาบนเว็บ
        function spawnObject() {
            const gameArea = document.getElementById('game-area');
            const element = document.createElement('div');
            element.classList.add('spawn-element');

            const rand = Math.random();
            
            if (rand < 0.35) {
                // 1. Khon Kaen Smart Bus (สีฟ้าสดใส) -> ช่วยลดรถติด
                element.style.backgroundColor = "#00C2FF"; 
                element.innerHTML = `<i class="fa-solid fa-bus" style="font-size: 2.5rem; color: #fff;"></i>`;
                element.dataset.type = "good";
            } else if (rand < 0.70) {
                // 2. รถสองแถวขอนแก่นสาย 8 / สายอื่นๆ (สีเขียวเหนี่ยวทรัพย์) -> ขนส่งมวลชนคู่เมือง
                element.style.backgroundColor = "#00E676";
                element.innerHTML = `<i class="fa-solid fa-van-shuttle" style="font-size: 2.5rem; color: #fff;"></i>`;
                element.dataset.type = "good";
            } else {
                // 3. รถยนต์ส่วนบุคคล (สีแดงตัวร้าย) -> ขับมาคนเดียวทำรถติดในเมือง!
                element.style.backgroundColor = "#FF5757";
                element.innerHTML = `<i class="fa-solid fa-car" style="font-size: 2.5rem; color: #fff;"></i>`;
                element.dataset.type = "bad";
            }

            // สุ่มตำแหน่งพิกัด X, Y ไม่ให้ล้นขอบจอเกมส์
            const x = Math.random() * (gameArea.clientWidth - 90) + 45;
            const y = Math.random() * (gameArea.clientHeight - 90) + 45;
            element.style.left = `${x}px`;
            element.style.top = `${y}px`;

            // รองรับทั้งระบบสัมผัส (Touch) บนมือถือ และการคลิกเมาส์บนคอมพิวเตอร์
            element.addEventListener('touchstart', (e) => {
                e.preventDefault();
                handleTap(element);
            });
            element.addEventListener('mousedown', () => handleTap(element));

            gameArea.appendChild(element);

            // ถ้าน้องๆ แตะไม่ทันภายใน 1 วินาที รถจะขับหายไปเอง
            setTimeout(() => {
                if(element.parentNode) {
                    element.remove();
                }
            }, 1000);
        }

        // ฟังก์ชันคำนวณคะแนนจากการแตะสัมผัส
        function handleTap(element) {
            if(element.dataset.type === "good") {
                score += 10; // สนับสนุนรถสาธารณะ ได้คะแนน!
            } else {
                score -= 15; // กดโดนรถส่วนตัว โดนหักคะแนน!
            }
            document.getElementById('score-txt').innerText = `คะแนน: ${score}`;
            element.remove();
        }

        // เมื่อหมดเวลา บันทึกคะแนนลง Firebase
        function endGame() {
            clearInterval(gameInterval);
            clearInterval(spawnInterval);
            document.getElementById('game-area').innerHTML = '';
            
            const name = prompt(`🎉 หมดเวลาแล้วจ้า! นายทำคะแนนได้: ${score} คะแนน\nกรุณาใส่ชื่อเล่นเพื่อบันทึกในตารางเด็กเทพขอนแก่น:`) || "ผู้เล่นนิรนาม";
            
            const scoresRef = ref(db, 'leaderboard');
            const newScoreRef = push(scoresRef);
            set(newScoreRef, {
                username: name,
                score: score,
                timestamp: Date.now()
            }).then(() => {
                showLeaderboard(); // บันทึกเสร็จแล้วเปิดหน้าดูคะแนนรวมทันที
            }).catch((error) => {
                console.error("Firebase Error: ", error);
                switchScreen('screen-menu');
            });
        }

        // ดึงข้อมูลอันดับจาก Realtime Database ของคุณสุชาติมาโชว์
        window.showLeaderboard = function() {
            switchScreen('screen-leaderboard');
            const listDiv = document.getElementById('leaderboard-list');
            listDiv.innerHTML = "กำลังดึงข้อมูลจากฐานข้อมูล Firebase...";

            const leaderboardRef = query(ref(db, 'leaderboard'), orderByChild('score'), limitToLast(5));
            
            onValue(leaderboardRef, (snapshot) => {
                listDiv.innerHTML = "";
                const data = [];
                snapshot.forEach((childSnapshot) => {
                    data.push(childSnapshot.val());
                });
                data.reverse(); // เรียงคะแนนจากมากไปหาน้อย

                if(data.length === 0) {
                    listDiv.innerHTML = "<p style='text-align:center;font-size:1.3rem;'>ยังไม่มีสถิติถูกบันทึก ประเดิมเป็นคนแรกเลย!</p>";
                    return;
                }

                data.forEach((user, index) => {
                    listDiv.innerHTML += `
                        <div class="score-row">
                            <span>🏅 อันดับ ${index+1} : ${user.username}</span>
                            <span style="color:var(--primary-color);">${user.score} แต้ม</span>
                        </div>
                    `;
                });
            });
        }

        window.goBackToMenu = function() {
            clearInterval(gameInterval);
            clearInterval(spawnInterval);
            document.getElementById('game-area').innerHTML = '';
            switchScreen('screen-menu');
        }

        function switchScreen(screenId) {
            document.querySelectorAll('.screen').forEach(s => s.classList.add('hidden'));
            document.getElementById(screenId).classList.remove('hidden');
        }
    </script>
</body>
</html>
